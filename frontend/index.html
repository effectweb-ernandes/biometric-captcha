<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biometric CAPTCHA -- Demo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>


<div style="max-width:860px;margin:0 auto 16px">
  <h1>Biometric CAPTCHA -- Demo</h1>
  <p class="sub">Digite normalmente ou simule um bot -- veja a analise em tempo real</p>
</div>


<div class="layout">


  <!-- Painel esquerdo: Formulario -->
  <div class="card">
    <h2>Formulario protegido <span id="badge" class="badge bi">aguardando</span></h2>


    <div class="field">
      <label for="fn">Nome completo</label>
      <input type="text" id="fn" placeholder="Joao Silva" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label for="fe">Email</label>
      <input type="email" id="fe" placeholder="joao@email.com" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label for="ft">Telefone</label>
      <input type="text" id="ft" placeholder="(11) 99999-9999" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label for="fm">Mensagem</label>
      <textarea id="fm" placeholder="Digite sua mensagem aqui..." spellcheck="false"></textarea>
